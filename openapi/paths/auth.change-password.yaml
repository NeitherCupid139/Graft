post:
  tags: [auth]
  summary: Change current user password
  operationId: postAuthChangePassword
  description: Changes the current authenticated user's password using the current password plus the new password.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/change-password-request.yaml
        examples:
          default:
            summary: Change password request
            value:
              current_password: current-password-123
              new_password: next-password-456
  responses:
    '200':
      description: Password changed.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-empty-response.yaml
          examples:
            success:
              summary: Password change succeeded
              value:
                success: true
                code: OK
                message: success
                traceId: e23dfe82-2f1c-4dc0-9ef7-bdf25082df25
                data: null
    '400':
      description: Invalid request or password validation failure.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
          examples:
            invalidBody:
              summary: Missing request body field
              value:
                success: false
                code: COMMON_INVALID_ARGUMENT
                message: 请求参数不合法
                traceId: 8e734843-17da-4f96-89d7-78322a208fee
                messageKey: common.invalid_argument
                locale: zh-CN
                data:
                  field: current_password
            policyViolation:
              summary: Password policy violation
              value:
                success: false
                code: AUTH_PASSWORD_POLICY_VIOLATION
                message: 新密码不符合安全要求
                traceId: bfe6cd87-2683-442d-953a-f7d44ce1fe18
                messageKey: auth.password_policy_violation
                locale: zh-CN
                data: {}
            reuseForbidden:
              summary: Password reuse forbidden
              value:
                success: false
                code: AUTH_PASSWORD_REUSE_FORBIDDEN
                message: 新密码不能与当前密码相同
                traceId: 39f64239-d438-4da4-8715-ac3bd2c95732
                messageKey: auth.password_reuse_forbidden
                locale: zh-CN
                data: {}
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
