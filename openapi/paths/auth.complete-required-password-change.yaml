post:
  tags: [auth]
  summary: Complete required password change
  operationId: postAuthCompleteRequiredPasswordChange
  description: Completes the restricted-session required password change flow for the current authenticated user.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/complete-required-password-change-request.yaml
        examples:
          default:
            summary: Complete required password change request
            value:
              new_password: next-password-456
  responses:
    '200':
      description: Required password change completed.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-empty-response.yaml
          examples:
            success:
              summary: Required password change succeeded
              value:
                success: true
                code: OK
                message: success
                traceId: c2104556-8d62-4889-bb7b-54d2eb7cbfd3
                data: null
    '400':
      description: Invalid request or password validation failure.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
          examples:
            invalidBody:
              summary: Missing new password
              value:
                success: false
                code: COMMON_INVALID_ARGUMENT
                message: 请求参数不合法
                traceId: 79af8885-6972-4b0f-a594-f9d5208092bc
                messageKey: common.invalid_argument
                locale: zh-CN
                data:
                  field: new_password
            policyViolation:
              summary: Password policy violation
              value:
                success: false
                code: AUTH_PASSWORD_POLICY_VIOLATION
                message: 新密码不符合安全要求
                traceId: f4be87d0-c1b6-4606-908d-7d3dc1f8e014
                messageKey: auth.password_policy_violation
                locale: zh-CN
                data: {}
            reuseForbidden:
              summary: Password reuse forbidden
              value:
                success: false
                code: AUTH_PASSWORD_REUSE_FORBIDDEN
                message: 新密码不能与当前密码相同
                traceId: 6bb1c1e1-7ad8-425c-9721-4728d0cccdcf
                messageKey: auth.password_reuse_forbidden
                locale: zh-CN
                data: {}
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
