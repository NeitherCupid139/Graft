get:
  tags: [container]
  summary: List containers
  operationId: getContainers
  description: Returns container summaries for the configured container runtime.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - $ref: ../components/parameters/container-list-limit.yaml
    - $ref: ../components/parameters/container-list-offset.yaml
    - $ref: ../components/parameters/container-list-keyword.yaml
    - $ref: ../components/parameters/container-list-state.yaml
    - $ref: ../components/parameters/container-list-health.yaml
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Container list.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-container-list-response.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '400':
      description: Invalid query parameter.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
