post:
  tags: [users]
  summary: Revoke all sessions for one user
  operationId: postUserSessionsRevokeAll
  description: Revokes all refresh sessions for the target user through the admin user-session route.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      examples:
        existing:
          summary: Existing user id
          value: 42
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Sessions revoked.
      headers:
        Set-Cookie:
          description: Clears the refresh cookie when the target user matches the current browser session user.
          schema:
            type: string
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-empty-response.yaml
          examples:
            success:
              summary: Revoke-all succeeded
              value:
                success: true
                code: OK
                message: success
                traceId: 8d681a3a-a692-41cd-84d9-ae25a7452e1c
                data: null
    '400':
      description: Invalid user id.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
          examples:
            invalidUserID:
              summary: Invalid user id
              value:
                success: false
                code: COMMON_INVALID_ARGUMENT
                message: 请求参数不合法
                traceId: eeb36f7b-df12-4875-b78b-e595f3fd5f88
                messageKey: common.invalid_argument
                locale: zh-CN
                data:
                  field: id
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      description: User not found.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
          examples:
            userNotFound:
              summary: Target user does not exist
              value:
                success: false
                code: USER_NOT_FOUND
                message: 用户不存在
                traceId: cb3348af-5f64-481d-836d-d0ce1dc0d9b2
                messageKey: user.not_found
                locale: zh-CN
                data: {}
    '500':
      $ref: ../components/responses/internal-server-error.yaml
