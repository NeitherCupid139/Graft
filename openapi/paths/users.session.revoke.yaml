post:
  tags: [users]
  summary: Revoke one session for one user
  operationId: postUserSessionRevoke
  description: Revokes the specified refresh session for the target user through the admin user-session route.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      examples:
        existing:
          summary: Existing user id
          value: 42
    - name: sessionID
      in: path
      required: true
      schema:
        type: string
      examples:
        target:
          summary: Target session id
          value: b930d2e7-b704-4b5f-bd72-f66dbf35f0f6
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Session revoked.
      headers:
        Set-Cookie:
          description: Clears the refresh cookie when the revoked session matches the current browser session.
          schema:
            type: string
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-empty-response.yaml
          examples:
            success:
              summary: Revoke succeeded
              value:
                success: true
                code: OK
                message: success
                traceId: 1e7323c7-b20c-46b8-9710-b1e657369d46
                data: null
    '400':
      description: Invalid user id or session id.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
          examples:
            invalidUserID:
              summary: Invalid user id
              value:
                success: false
                code: COMMON_INVALID_ARGUMENT
                message: 请求参数不合法
                traceId: 73844b08-c92e-4259-8d18-b0633fbddd2a
                messageKey: common.invalid_argument
                locale: zh-CN
                data:
                  field: id
            invalidSessionID:
              summary: Invalid session id
              value:
                success: false
                code: COMMON_INVALID_ARGUMENT
                message: 请求参数不合法
                traceId: 8573f3af-d639-47d0-af06-4e6f9e9f4623
                messageKey: common.invalid_argument
                locale: zh-CN
                data:
                  field: sessionID
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      description: User or session not found.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
          examples:
            userNotFound:
              summary: Target user does not exist
              value:
                success: false
                code: USER_NOT_FOUND
                message: 用户不存在
                traceId: c5d1d7ee-3aa7-49bb-b995-0fd834af9e6b
                messageKey: user.not_found
                locale: zh-CN
                data: {}
            sessionNotFound:
              summary: Target session does not exist
              value:
                success: false
                code: AUTH_SESSION_NOT_FOUND
                message: 会话不存在
                traceId: 9fb0d3dc-0874-4d89-864d-3f51d8481a18
                messageKey: auth.session_not_found
                locale: zh-CN
                data: {}
    '500':
      $ref: ../components/responses/internal-server-error.yaml
