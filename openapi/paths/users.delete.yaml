post:
  tags: [users]
  summary: Delete one user
  operationId: postUserDelete
  description: Deletes the specified managed user without changing current backend delete semantics.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      examples:
        existing:
          summary: Existing user id
          value: 42
  security:
    - bearerAuth: []
  responses:
    '200':
      description: User deleted.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-empty-response.yaml
          examples:
            success:
              summary: Delete succeeded
              value:
                success: true
                code: OK
                message: success
                traceId: 7d952f27-8f5f-44c9-8c98-17688a64f18d
                data: null
    '400':
      description: Invalid user id or protected self-delete attempt.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
          examples:
            invalidUserID:
              summary: Invalid user id
              value:
                success: false
                code: COMMON_INVALID_ARGUMENT
                message: 请求参数不合法
                traceId: 3dd097e3-6a8d-4daa-b60f-f79652c1f20f
                messageKey: common.invalid_argument
                locale: zh-CN
                data:
                  field: id
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      description: User not found.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
          examples:
            userNotFound:
              summary: Target user does not exist
              value:
                success: false
                code: USER_NOT_FOUND
                message: 用户不存在
                traceId: 7a2fc871-f5cb-4dd4-9eaf-4a5f71e9d756
                messageKey: user.not_found
                locale: zh-CN
                data: {}
    '500':
      $ref: ../components/responses/internal-server-error.yaml
