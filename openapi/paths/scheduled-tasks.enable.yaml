post:
  tags: [scheduled-tasks]
  summary: Enable scheduled task
  operationId: postScheduledTaskEnable
  description: Enables one Scheduled Task and dynamically registers its cron schedule.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - $ref: ../components/parameters/scheduled-task-key.yaml
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Enabled scheduled task.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-scheduled-task-item.yaml
    '400':
      description: Scheduled task cannot be enabled because its definition is invalid.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      description: Scheduled task was not found.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
