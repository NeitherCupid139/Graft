get:
  tags: [access-log]
  summary: List access logs
  operationId: getAccessLogs
  description: Returns the canonical paged access-log explorer surface.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - name: page
      in: query
      schema:
        type: integer
        minimum: 1
    - name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
    - name: request_id
      in: query
      schema:
        type: string
    - name: user_id
      in: query
      schema:
        type: integer
        format: int64
        minimum: 1
    - name: username
      in: query
      schema:
        type: string
    - name: method
      in: query
      schema:
        type: string
    - name: path
      in: query
      schema:
        type: string
    - name: keyword
      in: query
      description: Canonical fuzzy match applied to `request_id`, `path`, and `username`.
      schema:
        type: string
    - name: path_match
      in: query
      schema:
        type: string
        enum: [exact, prefix]
    - name: route
      in: query
      schema:
        type: string
    - name: status_code
      in: query
      schema:
        type: integer
    - name: status_group
      in: query
      description: Repeated status-code group filter for builder presets.
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
          enum: ['4xx', '5xx']
    - name: duration_min_ms
      in: query
      schema:
        type: integer
        format: int64
    - name: duration_max_ms
      in: query
      schema:
        type: integer
        format: int64
    - name: started_from
      in: query
      description: Inclusive canonical request-time lower bound on `started_at`.
      schema:
        type: string
        format: date-time
    - name: started_to
      in: query
      description: Inclusive canonical request-time upper bound on `started_at`.
      schema:
        type: string
        format: date-time
    - name: occurred_from
      in: query
      description: Optional completed-time lower bound on `occurred_at` for secondary filtering.
      schema:
        type: string
        format: date-time
    - name: occurred_to
      in: query
      description: Optional completed-time upper bound on `occurred_at` for secondary filtering.
      schema:
        type: string
        format: date-time
    - name: sort
      in: query
      description: Repeated priority-ordered sort expression using `field:dir` semantics such as `started_at:desc`.
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
          pattern: '^(started_at|occurred_at|duration_ms|status_code):(asc|desc)$'
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Access log page.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-access-log-list-response.yaml
    '400':
      description: Invalid access log query.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
