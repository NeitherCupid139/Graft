post:
  tags: [system-config]
  summary: Reset one system configuration override
  operationId: postSystemConfigReset
  description: Deletes the administrator override and returns the module default as the effective value. Sensitive responses remain masked.
  parameters:
    - name: key
      in: path
      required: true
      schema:
        type: string
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Reset system configuration detail.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-system-config-item.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
