post:
  tags: [rbac]
  summary: Replace role bindings for one user
  operationId: postUserRolesAssign
  description: Replaces the target user's role bindings with the supplied role id snapshot.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      examples:
        existing:
          summary: Existing user id
          value: 42
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/replace-user-roles-request.yaml
        examples:
          replace:
            summary: Replace user roles
            value:
              role_ids: [1, 3]
  responses:
    '200':
      description: User roles replaced.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-empty-response.yaml
          examples:
            success:
              summary: Replace user roles succeeded
              value:
                success: true
                code: OK
                message: success
                traceId: c47e4da3-d42a-4f47-a389-e324a65a4d74
                data: null
    '400':
      description: Invalid user id or invalid role id list.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
          examples:
            invalidUserID:
              summary: Invalid user id
              value:
                success: false
                code: COMMON_INVALID_ARGUMENT
                message: 请求参数不合法
                traceId: db2f0f01-3dd7-4a70-8f1f-70d0b12fd7a1
                messageKey: common.invalid_argument
                locale: zh-CN
                data:
                  field: id
            invalidRoleIDs:
              summary: Invalid role id list
              value:
                success: false
                code: COMMON_INVALID_ARGUMENT
                message: 请求参数不合法
                traceId: 4cabbe31-bb74-42aa-9620-71603ef7f36d
                messageKey: common.invalid_argument
                locale: zh-CN
                data:
                  field: role_ids
            ownAdminProtection:
              summary: Own admin role cannot be removed
              value:
                success: false
                code: RBAC_CANNOT_REMOVE_OWN_ADMIN_ROLE
                message: 当前登录用户不能移除自己的管理员角色
                traceId: 3d282420-b704-4e9b-9056-2920dc84e5d2
                messageKey: rbac.cannot_remove_own_admin_role
                locale: zh-CN
                data:
                  field: role_ids
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      description: User not found.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
          examples:
            userNotFound:
              summary: Target user does not exist
              value:
                success: false
                code: USER_NOT_FOUND
                message: 用户不存在
                traceId: 66aaadf5-773f-40b9-98bd-feeec79f80ab
                messageKey: user.not_found
                locale: zh-CN
                data: {}
    '500':
      $ref: ../components/responses/internal-server-error.yaml
