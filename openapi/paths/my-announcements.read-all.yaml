post:
  tags: [announcements]
  summary: Mark all current-user announcements as read
  operationId: postMyAnnouncementsReadAll
  description: Marks all currently visible announcements as read for the current user.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Count of newly marked read announcements.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-announcement-read-all-response.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
