get:
  tags: [auth]
  summary: List current user sessions
  operationId: getAuthSessions
  description: Returns the current authenticated user's refresh-session summaries.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - $ref: ../components/parameters/session-list-limit.yaml
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Session list.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-session-list-response.yaml
          examples:
            default:
              summary: Current user session list
              value:
                success: true
                code: OK
                message: success
                traceId: 5a7fb4fe-c906-4dd6-8d93-f3bc1f2277ce
                data:
                  - session_id: b930d2e7-b704-4b5f-bd72-f66dbf35f0f6
                    created_at: '2026-05-24T08:00:00Z'
                    expires_at: '2026-05-31T08:00:00Z'
                    current: true
    '400':
      description: Invalid limit parameter.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
          examples:
            invalidLimit:
              summary: Invalid limit query
              value:
                success: false
                code: COMMON_INVALID_ARGUMENT
                message: 请求参数不合法
                traceId: 2895c0dc-8d5c-4c4e-af67-9cdc348eb3f5
                messageKey: common.invalid_argument
                locale: zh-CN
                data:
                  field: limit
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
