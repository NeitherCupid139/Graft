get:
  tags: [scheduled-tasks]
  summary: List scheduled tasks
  operationId: getScheduledTasks
  description: Returns Scheduled Tasks that bind Job Definitions to cron schedules.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - $ref: ../components/parameters/scheduled-task-list-limit.yaml
    - $ref: ../components/parameters/scheduled-task-list-offset.yaml
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Scheduled task list.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-scheduled-task-list-response.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
post:
  tags: [scheduled-tasks]
  summary: Create scheduled task
  operationId: postScheduledTask
  description: Creates one Scheduled Task bound to a registered Job Definition.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/create-scheduled-task-request.yaml
  responses:
    '200':
      description: Created scheduled task.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-scheduled-task-item.yaml
    '400':
      description: Scheduled task request validation failed.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '409':
      description: Scheduled task already exists.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
