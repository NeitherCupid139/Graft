post:
  tags: [announcements]
  summary: Publish an announcement
  operationId: postAnnouncementPublish
  description: Publishes an announcement, using the supplied publish time or the current server time.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
  requestBody:
    required: false
    content:
      application/json:
        schema:
          $ref: ../components/schemas/publish-announcement-request.yaml
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Published announcement.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-announcement-item.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      description: Announcement was not found.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
