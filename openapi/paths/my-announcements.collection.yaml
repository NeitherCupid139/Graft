get:
  tags: [announcements]
  summary: List current-user announcements
  operationId: getMyAnnouncements
  description: Returns announcements visible to the current authenticated user.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - name: unread_only
      in: query
      schema:
        type: boolean
        default: false
    - name: page
      in: query
      schema:
        type: integer
        minimum: 1
    - name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Current-user announcement page.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-announcement-list-response.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
