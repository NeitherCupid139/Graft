get:
  tags: [audit]
  summary: List audit logs
  operationId: getAuditLogs
  description: Returns a guarded paged audit-log list for MVP read-only inspection.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    - name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
    - name: actor_user_id
      in: query
      required: false
      schema:
        type: integer
        format: int64
        minimum: 1
    - name: action
      in: query
      required: false
      schema:
        type: string
    - name: resource_type
      in: query
      required: false
      schema:
        type: string
    - name: resource_id
      in: query
      required: false
      schema:
        type: string
    - name: resource_name
      in: query
      required: false
      schema:
        type: string
    - name: request_id
      in: query
      required: false
      schema:
        type: string
    - name: result
      in: query
      required: false
      schema:
        type: string
        enum: [SUCCESS, FAILED, DENIED, ERROR]
    - name: risk_level
      in: query
      required: false
      schema:
        type: string
        enum: [LOW, MEDIUM, HIGH, CRITICAL]
    - name: success
      in: query
      required: false
      schema:
        type: boolean
    - name: created_from
      in: query
      required: false
      schema:
        type: string
        format: date-time
    - name: created_to
      in: query
      required: false
      schema:
        type: string
        format: date-time
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Audit log page.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-audit-log-list-response.yaml
    '400':
      description: Invalid list filter or pagination query.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
