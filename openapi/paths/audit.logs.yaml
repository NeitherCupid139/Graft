get:
  tags: [audit]
  summary: List audit logs
  operationId: getAuditLogs
  description: Returns a guarded paged audit-log list for MVP read-only inspection.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    - name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
    - name: actor_user_id
      in: query
      required: false
      schema:
        type: integer
        format: int64
        minimum: 1
    - name: keyword
      in: query
      required: false
      schema:
        type: string
    - name: actor
      in: query
      required: false
      schema:
        type: string
    - name: action
      in: query
      required: false
      schema:
        type: string
    - name: preset
      in: query
      required: false
      schema:
        type: string
        enum: [last_24h, last_7d, last_30d]
    - name: scope
      in: query
      required: false
      description: Stable business drilldown scope. When present, scope-owned fields remain read-only until the client exits drilldown or converts to normal filters.
      schema:
        $ref: ../components/schemas/audit-drilldown-scope.yaml
    - name: business_category
      in: query
      required: false
      description: Backend-owned editable business category used by normal filters and scope conversion.
      schema:
        $ref: ../components/schemas/audit-business-category.yaml
    - name: action_prefix
      in: query
      required: false
      schema:
        type: string
    - name: action_prefixes
      in: query
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
    - name: action_keywords
      in: query
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
    - name: source
      in: query
      required: false
      schema:
        type: string
        enum: [REQUEST, SECURITY_EVENT, DOMAIN_EVENT]
    - name: resource_type
      in: query
      required: false
      schema:
        type: string
    - name: resource_types
      in: query
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
    - name: resource_id
      in: query
      required: false
      schema:
        type: string
    - name: resource_name
      in: query
      required: false
      schema:
        type: string
    - name: request_path_prefixes
      in: query
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
    - name: request_id
      in: query
      required: false
      schema:
        type: string
    - name: session_id
      in: query
      required: false
      schema:
        type: string
    - name: result
      in: query
      required: false
      schema:
        type: string
        enum: [SUCCESS, FAILED, DENIED, ERROR]
    - name: results
      in: query
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
          enum: [SUCCESS, FAILED, DENIED, ERROR]
    - name: risk_level
      in: query
      required: false
      schema:
        type: string
        enum: [LOW, MEDIUM, HIGH, CRITICAL]
    - name: risk_levels
      in: query
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
    - name: success
      in: query
      required: false
      schema:
        type: boolean
    - name: created_from
      in: query
      required: false
      schema:
        type: string
        format: date-time
    - name: created_to
      in: query
      required: false
      schema:
        type: string
        format: date-time
    - name: sort
      in: query
      required: false
      description: Repeated priority-ordered sort expression using `field:dir` semantics such as `created_at:desc`.
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
          pattern: '^(created_at):(asc|desc)$'
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Audit log page.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-audit-log-list-response.yaml
    '400':
      description: Invalid list filter, scope conflict, disabled scope, or pagination query.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
