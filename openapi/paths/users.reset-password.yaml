post:
  tags: [users]
  summary: Reset user password
  operationId: postUserResetPassword
  description: |
    Resets the managed user password using the existing backend reset semantics.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - name: id
      in: path
      required: true
      description: Target user id.
      schema:
        type: integer
        format: int64
        minimum: 1
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/reset-user-password-request.yaml
  responses:
    '200':
      description: Password reset.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-empty-response.yaml
    '400':
      description: Invalid request or password policy violation.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          examples:
            passwordPolicyViolation:
              summary: Password policy violation
              value:
                success: false
                code: AUTH_PASSWORD_POLICY_VIOLATION
                message: 新密码不符合安全要求
                traceId: 5b61d01d-c1bb-45f3-93a6-605ec0a63563
                messageKey: auth.password_policy_violation
                locale: zh-CN
                data:
                  field: new_password
            passwordReuseForbidden:
              summary: Password reuse forbidden
              value:
                success: false
                code: AUTH_PASSWORD_REUSE_FORBIDDEN
                message: 新密码不能重复使用默认密码或当前密码
                traceId: 5b61d01d-c1bb-45f3-93a6-605ec0a63563
                messageKey: auth.password_reuse_forbidden
                locale: zh-CN
                data:
                  field: new_password
          schema:
            $ref: ../components/schemas/error-response.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      description: User not found.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          examples:
            userNotFound:
              summary: Target user not found
              value:
                success: false
                code: USER_NOT_FOUND
                message: User not found
                traceId: 5b61d01d-c1bb-45f3-93a6-605ec0a63563
                messageKey: user.not_found
                locale: en-US
          schema:
            $ref: ../components/schemas/error-response.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
