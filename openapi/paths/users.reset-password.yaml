post:
  tags: [users]
  summary: Reset user password
  operationId: postUserResetPassword
  description: |
    Resets the managed user password using the existing backend reset semantics.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - name: id
      in: path
      required: true
      description: Target user id.
      schema:
        type: integer
        format: int64
        minimum: 1
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/reset-user-password-request.yaml
  responses:
    '200':
      description: Password reset.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-empty-response.yaml
    '400':
      description: Invalid request or password policy violation.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      description: User not found.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
