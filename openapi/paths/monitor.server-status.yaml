get:
  tags: [monitor]
  summary: Read current server status snapshot
  operationId: getMonitorServerStatus
  description: Returns the current aggregated monitor server-status snapshot and optional redis-backed trend points.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - $ref: ../components/parameters/trend-range-query.yaml
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Server status snapshot.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-server-status-response.yaml
          examples:
            default:
              summary: Current server status snapshot
              value:
                success: true
                code: OK
                message: success
                traceId: cce7c2c1-c177-4655-ac75-dbc294fcd5ff
                data:
                  status: healthy
                  observed_at: '2026-05-24T08:05:00Z'
                  server:
                    version: dev
                    started_at: '2026-05-24T08:00:00Z'
                    uptime_seconds: 300
                    go_version: go1.25.1
                    app_name: graft
                    app_env: prod
                  runtime:
                    go_version: go1.25.1
                    host_name: graft-dev
                    operating_system: linux
                    architecture: amd64
                    cpu_cores: 8
                    load_average:
                      one_minute: 0.57
                      five_minutes: 0.44
                      fifteen_minutes: 0.38
                    disk_usage:
                      path: /
                      total_bytes: 512110190592
                      used_bytes: 187904819200
                      free_bytes: 324205371392
                      used_percent: 36.69
                    host_memory_total_bytes: 34359738368
                    host_memory_used_bytes: 16819159040
                    host_memory_free_bytes: 17540579328
                    host_memory_used_percent: 48.95
                    goroutines: 37
                    runtime_alloc_bytes: 62914560
                    runtime_heap_in_use_bytes: 35651584
                    runtime_sys_bytes: 100663296
                    runtime_gc_cycles: 18
                  dependencies:
                    database:
                      status: healthy
                      detail: Database ping succeeded
                      latency_ms: 2.37
