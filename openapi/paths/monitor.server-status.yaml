                      status: disabled
                      detail: Redis client is not configured
                      latency_ms: null
                  summary:
                    total_dependencies: 2
                    healthy_dependencies: 1
                    degraded_dependencies: 0
                    unknown_dependencies: 0
                    disabled_dependencies: 1
                    total_plugins: 4
                    healthy_plugins: 4
                  trend:
                    range: 10m
                    retention_seconds: 600
                    sample_interval_seconds: 5
