get:
  tags: [container]
  summary: Read container dashboard summary
  operationId: getContainerDashboardSummary
  description: >
    Returns the container-module-owned dashboard summary projection built from current runtime list snapshots.
    The canonical realtime companion topic is `container.dashboard.summary`, which reuses the unified realtime
    subscription and WebSocket flow.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Container dashboard summary.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-container-dashboard-summary-response.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
