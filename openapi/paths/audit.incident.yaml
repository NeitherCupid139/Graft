get:
  tags: [audit]
  summary: Read audit incident drilldown
  operationId: getAuditIncident
  description: Returns the audit-owned incident context for one stable security timeline seed event.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - name: event_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Audit incident drilldown payload.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-audit-incident-response.yaml
    '400':
      description: Invalid incident seed event id.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      description: Audit incident seed event was not found.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
