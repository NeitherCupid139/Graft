get:
  tags: [announcements]
  summary: Get one announcement for management
  operationId: getAnnouncement
  description: Returns one management announcement record.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - $ref: ../components/parameters/announcement-id-path.yaml
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Announcement record.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-announcement-item.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      description: Announcement was not found.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
put:
  tags: [announcements]
  summary: Update an announcement
  operationId: putAnnouncement
  description: Updates editable announcement fields.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - $ref: ../components/parameters/announcement-id-path.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/update-announcement-request.yaml
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Updated announcement.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-announcement-item.yaml
    '400':
      description: Invalid announcement update request.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      description: Announcement was not found.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
delete:
  tags: [announcements]
  summary: Delete an announcement
  operationId: deleteAnnouncement
  description: Soft-deletes one announcement record.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - $ref: ../components/parameters/announcement-id-path.yaml
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Announcement was deleted.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-empty-response.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      description: Announcement was not found.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '409':
      description: Published announcements must be archived before deletion.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
          examples:
            publishedDeleteForbidden:
              summary: Published announcement delete conflict
              value:
                success: false
                code: ANNOUNCEMENT_PUBLISHED_DELETE_FORBIDDEN
                message: 已发布公告需先归档后删除
                traceId: 018fd40f-a68d-7d5d-8c89-13fd8c9cbe4a
                messageKey: announcement.published_delete_forbidden
                locale: zh-CN
    '500':
      $ref: ../components/responses/internal-server-error.yaml
