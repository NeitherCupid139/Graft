name: limit
in: query
required: false
description: Optional maximum number of sessions to return. The runtime accepts values from 1 to 100.
schema:
  type: integer
  minimum: 1
  maximum: 100
examples:
  recentTen:
    summary: Fetch at most ten sessions
    value: 10
  fullWindow:
    summary: Fetch up to the maximum supported window
    value: 100
