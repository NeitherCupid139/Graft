name: limit
in: query
required: false
description: Optional maximum number of scheduled task runs to return. The runtime accepts values from 1 to 100.
schema:
  type: integer
  minimum: 1
  maximum: 100
examples:
  recentTwenty:
    summary: Fetch the default recent run window
    value: 20
  fullWindow:
    summary: Fetch up to the maximum supported window
    value: 100
