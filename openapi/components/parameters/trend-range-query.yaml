name: trend_range
in: query
required: false
description: Optional trend window. Invalid values currently fall back to the backend default `10m`.
schema:
  type: string
  enum: [10m, 30m, 1h]
  default: 10m
examples:
  defaultWindow:
    summary: Default ten-minute trend
    value: 10m
  thirtyMinutes:
    summary: Thirty-minute trend
    value: 30m
  oneHour:
    summary: One-hour trend
    value: 1h
