type: object
required:
  - id
  - task_key
  - job_key
  - task_title
  - job_title
  - job_short_title
  - job_category
  - module_key
  - task_builtin
  - trigger_type
  - status
  - started_at
  - created_at
properties:
  id:
    type: integer
    format: int64
    minimum: 1
  task_key:
    type: string
  job_key:
    type: string
  task_title_key:
    type: string
  task_title:
    type: string
  job_title_key:
    type: string
  job_title:
    type: string
  job_short_title_key:
    type: string
  job_short_title:
    type: string
  job_category:
    type: string
    enum: [retention, sync, maintenance, notification, report, workflow, custom]
  module_key:
    type: string
  task_builtin:
    type: boolean
  trigger_type:
    type: string
    enum: [cron, manual, startup]
  status:
    type: string
    enum: [running, success, failed]
  error_message:
    type: string
  result_summary:
    type: string
  result_json:
    type: string
    pattern: '^\\s*\\{[\\s\\S]*\\}\\s*$'
    description: Structured JobRunResult JSON object string.
  effective_config:
    type: string
    pattern: '^\\s*\\{[\\s\\S]*\\}\\s*$'
    description: Effective config JSON object string used by an immediate manual run response when available.
  started_at:
    type: string
    format: date-time
  finished_at:
    type: string
    format: date-time
    nullable: true
  duration_ms:
    type: integer
    format: int64
    minimum: 0
    nullable: true
  created_at:
    type: string
    format: date-time
