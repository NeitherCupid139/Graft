type: object
required: [status, observed_at, server, runtime, dependencies, summary, trend, modules, anomalies]
properties:
  status:
    type: string
  observed_at:
    type: string
    format: date-time
  server:
    $ref: ./server-status-server.yaml
  runtime:
    $ref: ./server-status-runtime.yaml
  dependencies:
    $ref: ./server-status-dependencies.yaml
  summary:
    $ref: ./server-status-summary.yaml
  trend:
    $ref: ./server-status-trend.yaml
  modules:
    type: array
    items:
      $ref: ./server-status-module.yaml
  anomalies:
    type: array
    items:
      $ref: ./server-status-anomaly.yaml
