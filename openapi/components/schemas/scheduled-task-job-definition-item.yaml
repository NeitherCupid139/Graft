type: object
required:
  - job_key
  - module_key
  - category
  - category_key
  - title
  - short_title
  - config_schema
  - default_config
  - default_cron
  - default_enabled
  - enabled
  - actions
properties:
  job_key:
    type: string
    description: Stable Job Definition key registered by a module.
  module_key:
    type: string
    description: Module that declares this Job Definition.
  category:
    type: string
    enum: [retention, sync, maintenance, notification, report, workflow, custom]
  category_key:
    type: string
  title_key:
    type: string
  title:
    type: string
    description: Full Job Definition title fallback when the client has no translation for title_key.
  short_title_key:
    type: string
  short_title:
    type: string
    description: Compact Job Definition title fallback for list display.
  description_key:
    type: string
  description:
    type: string
    description: Direct display fallback when the client has no translation for description_key.
  config_schema:
    type: string
    pattern: '^\\s*\\{[\\s\\S]*\\}\\s*$'
    description: JSON Schema string for Scheduled Task config accepted by this Job Definition.
  default_config:
    type: string
    pattern: '^\\s*\\{[\\s\\S]*\\}\\s*$'
    description: Default config JSON object string for a new Scheduled Task bound to this Job Definition.
  default_cron:
    type: string
    description: Default cron expression declared by the Job Definition.
  default_enabled:
    type: boolean
    description: Whether new Scheduled Tasks for this Job Definition should be enabled by default.
  enabled:
    type: boolean
    description: Whether this Job Definition is active and can be selected.
  actions:
    type: array
    description: Backend-defined one-shot actions available for this Job Definition.
    items:
      type: object
      required:
        - key
      properties:
        key:
          type: string
        title:
          type: string
        description:
          type: string
        title_key:
          type: string
        description_key:
          type: string
        behavior:
          type: string
        behavior_key:
          type: string
        behavior_summary:
          type: string
        behavior_summary_key:
          type: string
        affected_resource:
          type: string
        affected_resource_key:
          type: string
        confirm_required:
          type: boolean
        theme:
          type: string
          enum: [default, primary, warning, danger, success]
