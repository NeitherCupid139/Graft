type: object
required:
  - key
  - owner
  - module
  - display_name_key
  - description_key
  - config_schema_json
  - default_config_json
  - default_cron_expression
  - default_enabled
  - actions
properties:
  key:
    type: string
    description: Stable Job Definition key registered by a module.
  owner:
    type: string
  module:
    type: string
  display_name_key:
    type: string
  description_key:
    type: string
  title:
    type: string
    description: Direct display fallback when the client has no translation for display_name_key.
  description:
    type: string
    description: Direct display fallback when the client has no translation for description_key.
  config_schema_json:
    type: string
    description: JSON Schema string for Scheduled Task config accepted by this Job Definition.
  default_config_json:
    type: string
    description: Default config JSON object string for a new Scheduled Task bound to this Job Definition.
  default_cron_expression:
    type: string
    description: Default cron expression declared by the Job Definition.
  default_enabled:
    type: boolean
    description: Whether new Scheduled Tasks for this Job Definition should be enabled by default.
  actions:
    type: array
    description: Backend-defined one-shot actions available for this Job Definition.
    items:
      type: object
      required:
        - key
      properties:
        key:
          type: string
        title:
          type: string
        description:
          type: string
        title_key:
          type: string
        description_key:
          type: string
        behavior:
          type: string
        behavior_key:
          type: string
        behavior_summary:
          type: string
        behavior_summary_key:
          type: string
        affected_resource:
          type: string
        affected_resource_key:
          type: string
        confirm_required:
          type: boolean
        theme:
          type: string
          enum: [default, primary, warning, danger, success]
