type: object
description: >
  Latest-known backend resource stats projection for one container. On HTTP list/detail responses this object is a seed
  snapshot for frontend stats state, not the final cross-page authority. Canonical stats authority remains the backend
  collector, cache, and `container.stats:{id}` topic chain.
required:
  - available
  - stats_available
properties:
  available:
    type: boolean
    description: Compatibility mirror of stats_available for existing clients. New UI code should use stats_available.
  unavailable_reason:
    type: string
    description: Compatibility mirror of stats_error_key for existing clients.
  stats_available:
    type: boolean
    description: True when Docker runtime CPU or memory stats were collected for this row.
  stats_error_key:
    type: string
    nullable: true
    description: Stable sanitized reason stats are absent, such as stats_timeout, stats_unavailable, or stats_incomplete.
  stats_error_message:
    type: string
    nullable: true
    description: Sanitized display-safe stats collection message; raw Docker daemon errors are not exposed.
  collected_at:
    type: string
    format: date-time
    nullable: true
    description: >
      RFC3339 timestamp of the latest-known stats snapshot represented by this summary. Consumers should use it to
      compare HTTP seed snapshots with realtime updates and preserve newer stats authority.
  cpu_percent:
    type: number
    format: double
    minimum: 0
    description: Docker-compatible instantaneous CPU usage percentage derived from consecutive stats samples. The value may exceed 100 on multi-core hosts.
  online_cpus:
    type: integer
    format: int64
    minimum: 0
  system_cpu_usage:
    type: integer
    format: int64
    minimum: 0
  total_cpu_usage:
    type: integer
    format: int64
    minimum: 0
  cpu_usage_in_usermode:
    type: integer
    format: int64
    minimum: 0
  cpu_usage_in_kernelmode:
    type: integer
    format: int64
    minimum: 0
  throttling_periods:
    type: integer
    format: int64
    minimum: 0
  throttling_throttled_periods:
    type: integer
    format: int64
    minimum: 0
  throttling_throttled_time:
    type: integer
    format: int64
    minimum: 0
  memory_usage_bytes:
    type: integer
    format: int64
    minimum: 0
  memory_limit_bytes:
    type: integer
    format: int64
    minimum: 0
  memory_percent:
    type: number
    format: double
    minimum: 0
  memory_cache:
    type: integer
    format: int64
    minimum: 0
  memory_rss:
    type: integer
    format: int64
    minimum: 0
  memory_active_file:
    type: integer
    format: int64
    minimum: 0
  memory_inactive_file:
    type: integer
    format: int64
    minimum: 0
  memory_pgfault:
    type: integer
    format: int64
    minimum: 0
  memory_pgmajfault:
    type: integer
    format: int64
    minimum: 0
  rx_bytes:
    type: integer
    format: int64
    minimum: 0
  tx_bytes:
    type: integer
    format: int64
    minimum: 0
  rx_packets:
    type: integer
    format: int64
    minimum: 0
  tx_packets:
    type: integer
    format: int64
    minimum: 0
  rx_errors:
    type: integer
    format: int64
    minimum: 0
  tx_errors:
    type: integer
    format: int64
    minimum: 0
  rx_dropped:
    type: integer
    format: int64
    minimum: 0
  tx_dropped:
