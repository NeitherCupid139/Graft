allOf:
  - $ref: ./container-summary.yaml
  - type: object
    required:
      - environment_policy
      - environment_masked_copy_enabled
      - mounts
      - networks
      - runtime_info
    properties:
      command:
        type: array
        items:
          type: string
      entrypoint:
        type: array
        items:
          type: string
      environment:
        type: array
        items:
          $ref: ./container-environment-entry.yaml
      environment_policy:
        type: string
        enum: [hidden, masked, plain]
        x-enum-varnames:
          - ContainerDetailEnvironmentPolicyHidden
          - ContainerDetailEnvironmentPolicyMasked
          - ContainerDetailEnvironmentPolicyPlain
        description: Effective container environment variable display policy applied to this detail response.
      environment_masked_copy_enabled:
        type: boolean
        description: Whether the current system policy allows copying real sensitive environment values from masked environment entries, .env export, and raw JSON copy flows when access is authorized.
      healthcheck:
        $ref: ./container-healthcheck.yaml
        description: Docker Healthcheck diagnostics from container inspect. Omitted when no Healthcheck is configured.
      working_dir:
        type: string
      last_exit_code:
        type: integer
        nullable: true
        description: Last container process exit code from Docker inspect state when available.
      oom_killed:
        type: boolean
        nullable: true
        description: Whether Docker inspect reports the container was killed by the OOM killer.
      mounts:
        type: array
        items:
          $ref: ./container-mount.yaml
      networks:
        type: array
        items:
          $ref: ./container-network.yaml
      orchestrator:
        $ref: ./container-orchestrator-info.yaml
      runtime_info:
        $ref: ./container-runtime-info.yaml
      inspect_updated_at:
        type: string
        format: date-time
description: >
  Container detail returns environment variables according to the configured display policy and omits raw inspect payload
  fields that may contain secrets.
