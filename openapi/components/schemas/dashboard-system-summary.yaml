type: object
required:
  - current_user
  - app_env
  - locale
  - modules
  - visible_widgets
  - failed_tasks
  - high_risk_events
  - abnormal_services
properties:
  current_user:
    $ref: ./dashboard-current-user-summary.yaml
  app_env:
    type: string
  locale:
    $ref: ./dashboard-locale-summary.yaml
  modules:
    $ref: ./dashboard-module-summary.yaml
  visible_widgets:
    type: integer
    minimum: 0
  failed_tasks:
    type: integer
    minimum: 0
  high_risk_events:
    type: integer
    minimum: 0
  abnormal_services:
    type: integer
    minimum: 0
