type: object
required:
  - id
  - name
  - short_id
  - image
  - state
  - resource
properties:
  id:
    type: string
  name:
    type: string
  short_id:
    type: string
  image:
    type: string
  state:
    type: string
    enum: [created, running, paused, restarting, removing, exited, dead, unknown]
    x-enum-varnames:
      - ContainerDashboardTopItemStateCreated
      - ContainerDashboardTopItemStateRunning
      - ContainerDashboardTopItemStatePaused
      - ContainerDashboardTopItemStateRestarting
      - ContainerDashboardTopItemStateRemoving
      - ContainerDashboardTopItemStateExited
      - ContainerDashboardTopItemStateDead
      - ContainerDashboardTopItemStateUnknown
  health:
    type: string
    nullable: true
    enum: [healthy, unhealthy, starting, none, unavailable]
    x-enum-varnames:
      - ContainerDashboardTopItemHealthHealthy
      - ContainerDashboardTopItemHealthUnhealthy
      - ContainerDashboardTopItemHealthStarting
      - ContainerDashboardTopItemHealthNone
      - ContainerDashboardTopItemHealthUnavailable
  restart_count:
    type: integer
    minimum: 0
    nullable: true
  resource:
    $ref: ./container-resource-summary.yaml
