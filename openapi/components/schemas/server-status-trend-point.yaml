type: object
required:
  - observed_at
  - cpu_percent
  - host_memory_used_percent
  - load_average_one_minute
  - load_average_five_minutes
  - load_average_fifteen_minutes
  - goroutines
  - runtime_alloc_bytes
  - runtime_heap_in_use_bytes
  - runtime_sys_bytes
properties:
  observed_at:
    type: string
    format: date-time
  cpu_percent:
    type: number
    description: Host total CPU utilization percent.
    minimum: 0
    maximum: 100
  host_memory_used_percent:
    type: number
  load_average_one_minute:
    type: number
  load_average_five_minutes:
    type: number
  load_average_fifteen_minutes:
    type: number
  goroutines:
    type: integer
  runtime_alloc_bytes:
    type: integer
    format: int64
  runtime_heap_in_use_bytes:
    type: integer
    format: int64
  runtime_sys_bytes:
    type: integer
    format: int64
example:
  observed_at: '2026-05-24T08:05:00Z'
  cpu_percent: 21.8
  host_memory_used_percent: 46.9
  load_average_one_minute: 0.57
  load_average_five_minutes: 0.44
  load_average_fifteen_minutes: 0.38
  goroutines: 23
  runtime_alloc_bytes: 62914560
  runtime_heap_in_use_bytes: 35651584
  runtime_sys_bytes: 100663296
