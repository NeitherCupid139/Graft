type: object
required:
  - id
  - action
  - success
  - request_id
  - message
  - metadata
  - created_at
properties:
  id:
    type: integer
    format: int64
  actor_user_id:
    type: integer
    format: int64
    nullable: true
  actor_username:
    type: string
  actor_display_name:
    type: string
  source:
    type: string
    enum: [REQUEST, SECURITY_EVENT, DOMAIN_EVENT]
  action:
    type: string
  resource_type:
    type: string
  resource_id:
    type: string
  resource_name:
    type: string
  success:
    type: boolean
  request_id:
    type: string
  message:
    type: string
  metadata:
    type: object
    additionalProperties: true
  created_at:
    type: string
    format: date-time
