type: object
required: [session_id, created_at, expires_at, current]
properties:
  session_id:
    type: string
  created_at:
    type: string
    format: date-time
  expires_at:
    type: string
    format: date-time
  current:
    type: boolean
example:
  session_id: b930d2e7-b704-4b5f-bd72-f66dbf35f0f6
  created_at: '2026-05-24T08:00:00Z'
  expires_at: '2026-05-31T08:00:00Z'
  current: true
