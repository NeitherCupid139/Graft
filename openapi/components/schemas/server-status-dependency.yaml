type: object
required: [status, detail, latency_ms]
properties:
  status:
    type: string
  detail:
    type: string
  latency_ms:
    type: number
    nullable: true
  pool:
    $ref: ./server-status-connection-pool.yaml
    nullable: true
example:
  status: healthy
  detail: Database ping succeeded
  latency_ms: 2.37
  pool:
    capacity: 25
    max_active_connections: 25
    open_connections: 8
    in_use_connections: 3
    idle_connections: 5
    usage_percent: 12
    wait_count: 0
    wait_duration_ms: 0
    timeout_count: 0
    stale_count: 1
