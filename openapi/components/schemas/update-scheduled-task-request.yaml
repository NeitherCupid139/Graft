type: object
properties:
  title:
    type: string
    minLength: 1
  description:
    type: string
  cron_expression:
    type: string
    minLength: 1
  enabled:
    type: boolean
  config_json:
    type: string
    pattern: '^\\s*\\{[\\s\\S]*\\}\\s*$'
    description: JSON object string validated by the scheduler runtime before it is passed to the Job Definition handler.
