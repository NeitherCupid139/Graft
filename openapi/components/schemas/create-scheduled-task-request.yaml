type: object
required:
  - task_key
  - job_key
  - title
  - cron_expression
  - enabled
properties:
  task_key:
    type: string
    minLength: 1
    description: Stable scheduled task instance key.
  job_key:
    type: string
    minLength: 1
    description: Stable Job Definition key this Scheduled Task executes.
  title:
    type: string
    minLength: 1
  description:
    type: string
  cron_expression:
    type: string
    minLength: 1
  enabled:
    type: boolean
  params_json:
    type: string
    description: JSON parameters passed to the Job Definition handler when this Scheduled Task runs.
