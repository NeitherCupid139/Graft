type: object
required:
  - task_key
  - job_key
  - title
  - cron_expression
  - enabled
properties:
  task_key:
    type: string
    minLength: 1
    description: Stable scheduled task instance key.
  job_key:
    type: string
    minLength: 1
    description: Stable Job Definition key this Scheduled Task executes.
  title:
    type: string
    minLength: 1
  description:
    type: string
  cron_expression:
    type: string
    minLength: 1
    description: Cron expression validated by the scheduler runtime.
  enabled:
    type: boolean
  config_json:
    type: string
    pattern: '^\\s*\\{[\\s\\S]*\\}\\s*$'
    description: JSON object string validated by the scheduler runtime before it is passed to the Job Definition handler.
