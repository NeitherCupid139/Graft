type: object
required:
  - private_port
  - type
properties:
  ip:
    type: string
  private_port:
    type: integer
    minimum: 1
    maximum: 65535
  public_port:
    type: integer
    minimum: 1
    maximum: 65535
  type:
    type: string
    enum: [tcp, udp, sctp]
    x-enum-varnames:
      - ContainerPortTypeValueTCP
      - ContainerPortTypeValueUDP
      - ContainerPortTypeValueSCTP
