type: object
required:
  - id
  - action
  - resource_type
  - success
  - request_id
  - ip
  - user_agent
  - message
  - metadata
  - created_at
properties:
  id:
    type: integer
    format: int64
  actor_user_id:
    type: integer
    format: int64
    nullable: true
  actor_username:
    type: string
  actor_display_name:
    type: string
  action:
    type: string
  source:
    type: string
    enum: [REQUEST, SECURITY_EVENT, DOMAIN_EVENT]
  resource_type:
    type: string
  resource_id:
    type: string
  resource_name:
    type: string
  success:
    type: boolean
  result:
    type: string
    enum: [SUCCESS, FAILED, DENIED, ERROR]
  risk_level:
    type: string
    enum: [LOW, MEDIUM, HIGH, CRITICAL]
  target_type:
    type: string
  target_label:
    type: string
  request_id:
    type: string
  trace_id:
    type: string
  session_id:
    type: string
  ip:
    type: string
  user_agent:
    type: string
  request_method:
    type: string
  request_path:
    type: string
  status_code:
    type: integer
  message:
    type: string
  metadata:
    type: object
    additionalProperties: true
  created_at:
    type: string
    format: date-time
