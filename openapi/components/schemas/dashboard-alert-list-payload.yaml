type: object
required: [items]
properties:
  items:
    type: array
    items:
      type: object
      required: [id, level, title_key, title]
      properties:
        id:
          type: string
        level:
          type: string
          enum: [info, warning, error]
        title_key:
          type: string
        title:
          type: string
        description_key:
          type: string
        description:
          type: string
        count:
          type: integer
          minimum: 1
        occurred_at:
          type: string
          format: date-time
        route_location:
          type: string
  empty_key:
    type: string
  empty:
    type: string
