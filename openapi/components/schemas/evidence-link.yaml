type: object
required: [target_kind, link_state, title]
properties:
  target_kind:
    type: string
    enum: [audit_context, audit_incident]
  link_state:
    type: string
    enum: [available, empty, unsupported, unavailable]
  title:
    type: string
  reason:
    type: string
  time_window:
    $ref: ./evidence-link-time-window.yaml
  audit_context:
    $ref: ./audit-evidence-context.yaml
  incident_seed:
    type: object
    required: [event_id]
    properties:
      event_id:
        type: integer
        format: int64
