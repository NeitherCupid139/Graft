type: object
required:
  - id
  - name
  - short_id
  - image
  - state
  - resource
properties:
  id:
    type: string
  name:
    type: string
  short_id:
    type: string
  image:
    type: string
  state:
    type: string
    enum: [created, running, paused, restarting, removing, exited, dead, unknown]
    x-enum-varnames:
      - ContainerDashboardAnomalyItemStateCreated
      - ContainerDashboardAnomalyItemStateRunning
      - ContainerDashboardAnomalyItemStatePaused
      - ContainerDashboardAnomalyItemStateRestarting
      - ContainerDashboardAnomalyItemStateRemoving
      - ContainerDashboardAnomalyItemStateExited
      - ContainerDashboardAnomalyItemStateDead
      - ContainerDashboardAnomalyItemStateUnknown
  health:
    type: string
    nullable: true
    enum: [healthy, unhealthy, starting, none, unavailable]
    x-enum-varnames:
      - ContainerDashboardAnomalyItemHealthHealthy
      - ContainerDashboardAnomalyItemHealthUnhealthy
      - ContainerDashboardAnomalyItemHealthStarting
      - ContainerDashboardAnomalyItemHealthNone
      - ContainerDashboardAnomalyItemHealthUnavailable
  restart_count:
    type: integer
    minimum: 0
    nullable: true
  status:
    type: string
    nullable: true
  reason_code:
    type: string
    nullable: true
    enum: [health.unhealthy, state.restarting, state.exited, state.dead, state.unknown]
    x-enum-varnames:
      - ContainerDashboardAnomalyReasonCodeHealthUnhealthy
      - ContainerDashboardAnomalyReasonCodeStateRestarting
      - ContainerDashboardAnomalyReasonCodeStateExited
      - ContainerDashboardAnomalyReasonCodeStateDead
      - ContainerDashboardAnomalyReasonCodeStateUnknown
  reason_label:
    type: string
    nullable: true
  resource:
    $ref: ./container-resource-summary.yaml
