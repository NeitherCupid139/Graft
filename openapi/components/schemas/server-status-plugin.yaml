type: object
required: [name, status, status_detail, version, depends_on]
properties:
  name:
    type: string
  status:
    type: string
  status_detail:
    type: string
  version:
    type: string
  depends_on:
    type: array
    items:
      type: string
  missing_dependencies:
    type: array
    items:
      type: string
example:
  name: monitor
  status: healthy
  status_detail: Runtime metadata is present and platform signals are healthy
  version: 0.1.0
  depends_on: [user, rbac]
  missing_dependencies: []
