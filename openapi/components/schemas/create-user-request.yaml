type: object
required: [username, display, password]
properties:
  username:
    type: string
  display:
    type: string
  password:
    type: string
    minLength: 12
    pattern: '^(.*[A-Za-z].*\d.*|.*\d.*[A-Za-z].*)$'
    description: Initial password. The current server policy requires at least 12 characters and both letters and digits.
