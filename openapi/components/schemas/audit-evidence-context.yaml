type: object
properties:
  action:
    type: string
  action_prefix:
    type: string
  source:
    type: string
    enum: [REQUEST, SECURITY_EVENT, DOMAIN_EVENT]
  resource_type:
    type: string
  resource_id:
    type: string
  resource_name:
    type: string
  request_id:
    type: string
  result:
    type: string
    enum: [SUCCESS, FAILED, DENIED, ERROR]
  risk_level:
    type: string
    enum: [LOW, MEDIUM, HIGH, CRITICAL]
  created_from:
    type: string
    format: date-time
  created_to:
    type: string
    format: date-time
