type: object
required:
  - key
  - module
  - group
  - type
  - config_schema
  - has_override
  - status
  - sensitive
  - masked
  - restart_required
  - runtime_apply_mode
properties:
  key:
    type: string
    description: Stable ConfigDefinition key registered by a module.
  module:
    type: string
    description: Module that owns the ConfigDefinition authority.
  domain:
    type: string
    description: Configuration domain key used for domain-first settings navigation.
  domain_key:
    type: string
    description: Stable localization key for the domain display label.
  domain_label:
    type: string
    description: Direct domain-label fallback when the client has no translation for domain_key.
  group:
    type: string
    description: Module-declared grouping key for the settings UI.
  group_key:
    type: string
    description: Stable localization key for the group display label.
  group_label:
    type: string
    description: Direct group-label fallback when the client has no translation for group_key.
  group_description:
    type: string
    description: Direct group-description fallback when the client has no translation for group_description_key.
  group_description_key:
    type: string
    description: Stable localization key for the group description.
  title:
    type: string
    description: Direct title fallback when the client has no translation for title_key.
  title_key:
    type: string
    description: Stable localization key for the config item title.
  description:
    type: string
    description: Direct description fallback when the client has no translation for description_key.
  description_key:
    type: string
    description: Stable localization key for the config item description.
  tags:
    type: array
    items:
      type: string
    description: Module-declared technical tags for filtering and display.
  type:
    type: string
    enum: [string, number, integer, boolean, object, array]
  config_schema:
    type: object
    additionalProperties: true
    description: JSON Schema compatible object declared by the module, including Graft x-i18n extensions.
  status:
    type: string
    enum: [default, modified]
    description: Whether the effective value is using the module default or a stored user override.
  default_value:
    type: string
    nullable: true
    description: JSON string for the module default; null when sensitive=true.
  effective_value:
    type: string
    nullable: true
    description: JSON string after applying a user override; null when sensitive=true.
  override_value:
    type: string
    nullable: true
    description: User override JSON string; null when no override or sensitive=true.
  has_override:
    type: boolean
    description: Whether system_config_values currently stores a user override for this key.
  updated_at:
    type: string
    format: date-time
    nullable: true
    description: Last write time for the current user override; null when status=default.
  updated_by_user_id:
    type: integer
    format: int64
    nullable: true
    description: User ID that last wrote the current override; null when unavailable or status=default.
  updated_by_username:
    type: string
    nullable: true
    description: Username for updated_by_user_id when it can be resolved.
  sensitive:
    type: boolean
    description: Whether plaintext values must not be returned to clients.
  masked:
    type: boolean
    description: True when value fields are intentionally withheld from the response.
  masked_placeholder:
    type: string
    nullable: true
    description: Stable display placeholder for masked sensitive values.
  restart_required:
    type: boolean
    description: Whether changing this config requires a service restart before it takes effect.
  runtime_apply_mode:
    type: string
    enum: [unknown, runtime_hot, restart_required]
    description: Canonical runtime apply semantics declared by the config-definition owner; unknown means the current authority has not classified it yet.
  permission:
    type: string
    description: Permission code required to update this config item when the definition declares one.
  order:
    type: integer
    description: Module-declared display order within the config group.
