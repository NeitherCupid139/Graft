type: object
required:
  - id
  - task_key
  - job_key
  - title
  - cron_expression
  - enabled
  - builtin
  - config_json
  - config_source
  - effective_config
  - status
  - running
  - created_at
  - updated_at
properties:
  id:
    type: integer
    format: int64
    minimum: 1
  task_key:
    type: string
    description: Stable Scheduled Task instance key.
  job_key:
    type: string
    description: Stable Job Definition key executed by this Scheduled Task.
  title_key:
    type: string
  title:
    type: string
  description_key:
    type: string
  description:
    type: string
  cron_expression:
    type: string
    description: Cron expression validated by the scheduler runtime.
  enabled:
    type: boolean
    description: Whether the Scheduled Task is enabled in the DB-backed schedule definition.
  builtin:
    type: boolean
    description: Builtin Scheduled Tasks cannot be deleted or change task_key/job_key.
  config_json:
    type: string
    pattern: '^\\s*\\{[\\s\\S]*\\}\\s*$'
    description: Scheduled Task instance config override JSON object string.
  config_source:
    type: string
    enum: [system, user]
    description: system means using Job Definition default_config; user means applying task config_json override.
  effective_config:
    type: string
    pattern: '^\\s*\\{[\\s\\S]*\\}\\s*$'
    description: Effective config JSON object string computed by merging Job Definition default_config with task config_json.
  job:
    $ref: ./scheduled-task-job-definition-summary.yaml
  last_run:
    $ref: ./scheduled-task-last-run.yaml
  next_run_at:
    type: string
    format: date-time
    description: Reserved for future runtime prediction. Omitted when the current runtime cannot expose a stable next-run value.
  status:
    type: string
    enum: [idle, running, success, failed, unknown]
  running:
    type: boolean
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
