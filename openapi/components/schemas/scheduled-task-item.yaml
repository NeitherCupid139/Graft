type: object
required:
  - key
  - job_key
  - schedule_type
  - display_name_key
  - description_key
  - owner
  - module
  - enabled
  - schedule
  - status
  - running
properties:
  key:
    type: string
    description: Stable Scheduled Task instance key.
  job_key:
    type: string
    description: Stable Job Definition key executed by this Scheduled Task.
  schedule_type:
    type: string
    enum: [cron]
  display_name_key:
    type: string
  description_key:
    type: string
  owner:
    type: string
  module:
    type: string
  enabled:
    type: boolean
    description: Whether the Scheduled Task is enabled in the DB-backed schedule definition.
  builtin:
    type: boolean
    description: Builtin Scheduled Tasks cannot be deleted or change task_key/job_key.
  title:
    type: string
  description:
    type: string
  schedule:
    type: string
    description: Cron expression validated by the scheduler runtime.
  params_json:
    type: string
    pattern: '^\\s*\\{[\\s\\S]*\\}\\s*$'
    description: JSON object string validated by the scheduler runtime before it is passed to the Job Definition handler.
  last_run:
    $ref: ./scheduled-task-last-run.yaml
  next_run_at:
    type: string
    format: date-time
    description: Reserved for future runtime prediction. Omitted when the current runtime cannot expose a stable next-run value.
  status:
    type: string
    enum: [idle, running, success, failed, unknown]
  running:
    type: boolean
