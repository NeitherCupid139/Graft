type: object
required:
  - runtime
  - status
  - endpoint
properties:
  runtime:
    type: string
    description: Container runtime adapter key.
  status:
    type: string
    enum: [enabled, disabled, unavailable]
    x-enum-varnames:
      - ContainerRuntimeInfoStatusEnabled
      - ContainerRuntimeInfoStatusDisabled
      - ContainerRuntimeInfoStatusUnavailable
  endpoint:
    type: string
    description: Runtime endpoint label. Sensitive credentials must not be included.
  api_version:
    type: string
  server_version:
    type: string
  operating_system:
    type: string
  architecture:
    type: string
  containers_total:
    type: integer
    minimum: 0
  containers_running:
    type: integer
    minimum: 0
