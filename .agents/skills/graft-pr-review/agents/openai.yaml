interface:
  display_name: "Graft PR Review"
  short_description: "Inspect the current PR and AI review findings"
  default_prompt: "Use $graft-pr-review to inspect the current branch PR through the GitHub API, fetch live failed GitHub checks for the PR head commit before trusting summary comments, prioritize unresolved review threads on the latest head commit from supported AI reviewers such as CodeRabbit, greptile-apps, and gemini-code-assist, run the smallest local repro command for any failed check, and reply directly on verified noise/misread AI findings while carrying contested follow-ups to the final human summary."
