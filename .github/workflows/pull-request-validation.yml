name: Pull Request Validation

on:
  pull_request:
    branches: [main]
#    paths:
#      - ".github/workflows/**"
#      - "AGENTS.md"
#      - "README.md"
#      - "ai-plan/**"
#      - "server/**"
#      - "web/**"
  push:
    branches: [main]
#    paths:
#      - ".github/workflows/**"
#      - "AGENTS.md"
#      - "README.md"
#      - "ai-plan/**"
#      - "server/**"
#      - "web/**"

permissions:
  contents: read

env:
  GOLANGCI_LINT_VERSION: v2.12.2

jobs:
  web-smoke:
    name: Web Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install web dependencies
        working-directory: web
        run: npm install --ignore-scripts --no-audit --no-fund

  server-lint:
    name: Server Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: server
          install-only: true

      - name: Run server lint validation
        working-directory: server
        run: go run ./cmd/graft validate backend --stage lint

  server-build-test:
    name: Server Build/Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod

      - name: Run server build/test validation
        working-directory: server
        run: go run ./cmd/graft validate backend --stage buildtest
