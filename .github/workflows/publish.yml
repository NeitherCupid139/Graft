name: Publish Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read
  packages: write

jobs:
  build-artifacts:
    name: Build Artifacts
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      version: ${{ steps.tag_version.outputs.version }}

    steps:
      - name: Checkout repository at tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine tag version
        id: tag_version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          version="${version#V}"
          echo "tag=${tag}"
          echo "version=${version}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.13

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee
        with:
          version: v2.12.2
          working-directory: server
          install-only: true

      - name: Resolve backend release validation base
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --prune origin main
          echo "GRAFT_LINT_BASE_REF=refs/remotes/origin/main" >> "${GITHUB_ENV}"

      - name: Run backend release validation
        working-directory: server
        run: go run ./cmd/graft validate backend

      - name: Build server binary
        working-directory: server
        env:
          CGO_ENABLED: "1"
        run: |
          set -euo pipefail
          mkdir -p ../dist/server
          build_time_utc="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build \
            -trimpath \
            -ldflags="-s -w \
              -X 'graft/server/internal/buildinfo.version=${{ steps.tag_version.outputs.version }}' \
              -X 'graft/server/internal/buildinfo.gitCommit=${GITHUB_SHA}' \
              -X 'graft/server/internal/buildinfo.buildTimeUTC=${build_time_utc}' \
              -X 'graft/server/internal/buildinfo.gitTreeState=clean'" \
            -o ../dist/server/graft-server-linux-amd64 \
            ./cmd/graft

      - name: Validate release binary contract
        run: |
          set -euo pipefail
          ./dist/server/graft-server-linux-amd64 validate release

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Run web release validation
        working-directory: web
        run: bun run check

      - name: Build web distribution
        working-directory: web
        run: bun run build

      - name: Package release artifacts
        env:
          RELEASE_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          tar -C dist/server -czf "release-assets/graft-server-linux-amd64-${RELEASE_REF_NAME}.tar.gz" graft-server-linux-amd64
          tar -C web -czf "release-assets/graft-web-dist-${RELEASE_REF_NAME}.tar.gz" dist
          cp LICENSE "release-assets/graft-license-${RELEASE_REF_NAME}.txt"
          sha256sum release-assets/* > "release-assets/graft-sha256sums-${RELEASE_REF_NAME}.txt"

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-assets
          path: release-assets/*
          if-no-files-found: error

  publish-images:
    name: Publish Container Images
    runs-on: ubuntu-latest
    needs: build-artifacts

    permissions:
      contents: read
      packages: write

    outputs:
      owner_lc: ${{ steps.image_vars.outputs.owner_lc }}
      server_image: ${{ steps.image_vars.outputs.server_image }}
      web_image: ${{ steps.image_vars.outputs.web_image }}
      is_prerelease: ${{ steps.release_channel.outputs.is_prerelease }}
      server_digest: ${{ steps.server_build.outputs.digest }}
      web_digest: ${{ steps.web_build.outputs.digest }}

    steps:
      - name: Checkout repository at tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare image coordinates
        id: image_vars
        shell: bash
        run: |
          set -euo pipefail
          owner_lc="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          server_image="ghcr.io/${owner_lc}/graft-server"
          web_image="ghcr.io/${owner_lc}/graft-web"
          echo "owner_lc=${owner_lc}" >> "${GITHUB_OUTPUT}"
          echo "server_image=${server_image}" >> "${GITHUB_OUTPUT}"
          echo "web_image=${web_image}" >> "${GITHUB_OUTPUT}"

      - name: Detect release channel
        id: release_channel
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.build-artifacts.outputs.version }}
        run: |
          set -euo pipefail
          if [[ "${RELEASE_VERSION}" == *-* ]]; then
            echo "is_prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "is_prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Resolve image build timestamp
        id: image_build_time
        shell: bash
        run: |
          set -euo pipefail
          echo "build_time_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-assets
          path: release-assets

      - name: Restore web dist artifact
        env:
          RELEASE_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          rm -rf web/dist
          tar -C web -xzf "release-assets/graft-web-dist-${RELEASE_REF_NAME}.tar.gz"

      - name: Docker metadata for server image
        id: server_meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ steps.image_vars.outputs.server_image }}
          tags: |
            type=raw,value=${{ needs.build-artifacts.outputs.version }}
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest,enable=${{ steps.release_channel.outputs.is_prerelease != 'true' }}
          labels: |
            org.opencontainers.image.title=Graft Server
            org.opencontainers.image.description=Graft backend runtime image

      - name: Docker metadata for web image
        id: web_meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ steps.image_vars.outputs.web_image }}
          tags: |
            type=raw,value=${{ needs.build-artifacts.outputs.version }}
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest,enable=${{ steps.release_channel.outputs.is_prerelease != 'true' }}
          labels: |
            org.opencontainers.image.title=Graft Web
            org.opencontainers.image.description=Graft frontend static site image

      - name: Build and push server image
        id: server_build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.server_meta.outputs.tags }}
          labels: ${{ steps.server_meta.outputs.labels }}
          cache-from: type=gha,scope=graft-server-image
          cache-to: type=gha,mode=max,scope=graft-server-image
          build-args: |
            GRAFT_VERSION=${{ needs.build-artifacts.outputs.version }}
            GRAFT_GIT_COMMIT=${{ github.sha }}
            GRAFT_BUILD_TIME_UTC=${{ steps.image_build_time.outputs.build_time_utc }}
            GRAFT_GIT_TREE_STATE=clean

      - name: Build and push web image
        id: web_build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.web_meta.outputs.tags }}
          labels: ${{ steps.web_meta.outputs.labels }}
          cache-from: type=gha,scope=graft-web-image
          cache-to: type=gha,mode=max,scope=graft-web-image

      - name: Write image manifest
        env:
          RELEASE_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p image-assets
          cat > "image-assets/graft-container-images-${RELEASE_REF_NAME}.txt" <<EOF
          server_image=${{ steps.image_vars.outputs.server_image }}
          server_version_tag=${{ needs.build-artifacts.outputs.version }}
          server_ref_tag=${{ github.ref_name }}
          server_digest=${{ steps.server_build.outputs.digest }}
          web_image=${{ steps.image_vars.outputs.web_image }}
          web_version_tag=${{ needs.build-artifacts.outputs.version }}
          web_ref_tag=${{ github.ref_name }}
          web_digest=${{ steps.web_build.outputs.digest }}
          EOF

      - name: Upload image manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: image-assets
          path: image-assets/*
          if-no-files-found: error

  bubble-smoke:
    name: Bubble Smoke Gate
    runs-on: ubuntu-latest
    needs: build-artifacts
    timeout-minutes: 15

    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: graft
          POSTGRES_USER: graft
          POSTGRES_PASSWORD: graft
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U graft -d graft"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      GRAFT_APP_ENV: ci
      GRAFT_HTTP_ADDR: 127.0.0.1:18080
      GRAFT_DATABASE_URL: postgres://graft:graft@127.0.0.1:5432/graft?sslmode=disable
      GRAFT_REDIS_ADDR: 127.0.0.1:6379
      GRAFT_AUTH_JWT_SECRET: ci-release-smoke-secret
      GRAFT_LOG_FORMAT: json
      GRAFT_LOG_COLOR: never
      GRAFT_ACCESS_LOG_CONSOLE: error_only
      GRAFT_OPS_CONTAINER_RUNTIME_ENABLED: "false"
      GRAFT_OPS_CONTAINER_SHELL_ENABLED: "false"

    steps:
      - name: Checkout repository at tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-assets
          path: release-assets

      - name: Extract release binary
        run: |
          set -euo pipefail
          mkdir -p smoke-bin
          tar -C smoke-bin -xzf "release-assets/graft-server-linux-amd64-${GITHUB_REF_NAME}.tar.gz"
          chmod +x smoke-bin/graft-server-linux-amd64

      - name: Run release bubble smoke
        id: bubble_smoke
        shell: bash
        run: |
          set -euo pipefail
          start_epoch="$(date +%s)"
          probe_url="http://${GRAFT_HTTP_ADDR}/healthz"
          echo "probe_url=${probe_url}" >> "${GITHUB_OUTPUT}"

          mkdir -p .tmp
          ./smoke-bin/graft-server-linux-amd64 migrate up --allow-dirty 2>&1 | tee .tmp/release-bubble-migrate.log

          server_pid=""
          cleanup() {
            if [[ -n "${server_pid}" ]] && kill -0 "${server_pid}" >/dev/null 2>&1; then
              kill "${server_pid}" >/dev/null 2>&1 || true
              wait "${server_pid}" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          ./smoke-bin/graft-server-linux-amd64 serve > .tmp/release-bubble-server.log 2>&1 &
          server_pid=$!

          set +e
          smoke_status=1
          for _ in $(seq 1 30); do
            if curl -fsS "${probe_url}" > .tmp/release-bubble-healthz.json; then
              smoke_status=0
              break
            fi
            if ! kill -0 "${server_pid}" >/dev/null 2>&1; then
              smoke_status=1
              break
            fi
            sleep 1
          done
          end_epoch="$(date +%s)"
          duration="$((end_epoch - start_epoch))"
          echo "duration_seconds=${duration}" >> "${GITHUB_OUTPUT}"
          if [[ ${smoke_status} -ne 0 ]]; then
            echo "result=failed" >> "${GITHUB_OUTPUT}"
            cat .tmp/release-bubble-server.log
            exit "${smoke_status}"
          fi
          cat .tmp/release-bubble-healthz.json | tee .tmp/release-bubble-smoke.log
          set -e
          echo "result=passed" >> "${GITHUB_OUTPUT}"

      - name: Upload bubble smoke logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-bubble-smoke-logs
          path: |
            .tmp/release-bubble-migrate.log
            .tmp/release-bubble-server.log
            .tmp/release-bubble-healthz.json
            .tmp/release-bubble-smoke.log
          if-no-files-found: ignore

      - name: Write bubble smoke summary
        if: always()
        run: |
          {
            echo "## Bubble Smoke Gate"
            echo
            echo "- Tag: \`${{ github.ref_name }}\`"
            echo "- Version: \`${{ needs.build-artifacts.outputs.version }}\`"
            echo "- Probe URL: \`${{ steps.bubble_smoke.outputs.probe_url || 'http://127.0.0.1:18080/healthz' }}\`"
            echo "- Result: \`${{ steps.bubble_smoke.outputs.result || 'failed' }}\`"
            echo "- Duration Seconds: \`${{ steps.bubble_smoke.outputs.duration_seconds || 'unknown' }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  compose-smoke:
    name: Compose Smoke Gate
    runs-on: ubuntu-latest
    needs:
      - build-artifacts
      - publish-images
    timeout-minutes: 20

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository at tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Write compose environment
        shell: bash
        run: |
          set -euo pipefail
          cat > .env <<EOF
          GRAFT_SERVER_IMAGE=${{ needs.publish-images.outputs.server_image }}
          GRAFT_WEB_IMAGE=${{ needs.publish-images.outputs.web_image }}
          GRAFT_IMAGE_TAG=${{ needs.build-artifacts.outputs.version }}
          POSTGRES_DB=graft
          POSTGRES_USER=graft
          POSTGRES_PASSWORD=graft
          GRAFT_AUTH_JWT_SECRET=ci-compose-smoke-secret
          EOF

      - name: Start compose stack
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp
          docker compose pull
          docker compose up -d postgres redis

      - name: Run bootstrap migration
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f compose.yml -f compose.smoke.yml up -d bootstrap

      - name: Wait for bootstrap completion
        shell: bash
        run: |
          set -euo pipefail
          for _ in $(seq 1 60); do
            bootstrap_id="$(docker compose ps -aq bootstrap)"
            if [[ -z "${bootstrap_id}" ]]; then
              sleep 2
              continue
            fi
            status="$(docker inspect -f '{{.State.Status}}' "${bootstrap_id}")"
            exit_code="$(docker inspect -f '{{.State.ExitCode}}' "${bootstrap_id}")"
            if [[ "${status}" == "exited" && "${exit_code}" == "0" ]]; then
              exit 0
            fi
            if [[ "${status}" == "exited" && "${exit_code}" != "0" ]]; then
              echo "bootstrap failed with exit code ${exit_code}"
              docker compose ps -a
              docker inspect "${bootstrap_id}" || true
              docker compose logs bootstrap
              exit 1
            fi
            sleep 2
          done
          echo "bootstrap did not complete in time"
          docker compose ps -a
          if [[ -n "$(docker compose ps -aq bootstrap)" ]]; then
            docker inspect "$(docker compose ps -aq bootstrap)" || true
          fi
          docker compose logs bootstrap
          exit 1

      - name: Start server and web
        shell: bash
        run: |
          set -euo pipefail
          docker compose up -d server web

      - name: Wait for server and web readiness
        shell: bash
        run: |
          set -euo pipefail
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1/healthz > .tmp-compose-healthz.json \
              && curl -fsS http://127.0.0.1/openapi.json > .tmp-compose-openapi.json \
              && curl -fsS http://127.0.0.1/ > .tmp-compose-index.html; then
              exit 0
            fi
            sleep 2
          done
          echo "compose services were not ready in time"
          docker compose ps
          docker compose logs server web
          exit 1

      - name: Verify frontend shell and proxied assets
        shell: bash
        run: |
          set -euo pipefail
          grep -q "<!doctype html" .tmp-compose-index.html
          grep -q "\"openapi\"" .tmp-compose-openapi.json

      - name: Capture compose diagnostics
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp
          docker compose ps -a > .tmp/compose-ps.txt 2>&1 || true
          docker compose logs bootstrap > .tmp/compose-bootstrap.log 2>&1 || true
          docker compose logs postgres > .tmp/compose-postgres.log 2>&1 || true
          docker compose logs redis > .tmp/compose-redis.log 2>&1 || true
          docker compose logs server > .tmp/compose-server.log 2>&1 || true
          docker compose logs web > .tmp/compose-web.log 2>&1 || true

      - name: Upload compose smoke logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: compose-smoke-logs
          path: |
            .tmp-compose-healthz.json
            .tmp-compose-openapi.json
            .tmp-compose-index.html
            .tmp/compose-ps.txt
            .tmp/compose-bootstrap.log
            .tmp/compose-postgres.log
            .tmp/compose-redis.log
            .tmp/compose-server.log
            .tmp/compose-web.log
          if-no-files-found: ignore

      - name: Write compose smoke summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Compose Smoke Gate"
            echo
            echo "- Tag: \`${{ github.ref_name }}\`"
            echo "- Version: \`${{ needs.build-artifacts.outputs.version }}\`"
            echo "- Bootstrap: \`service_completed_successfully\`"
            echo "- Health Probe: \`http://127.0.0.1/healthz\`"
            echo "- Proxy Probe: \`http://127.0.0.1/openapi.json\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Tear down compose stack
        if: always()
        shell: bash
        run: |
          docker compose down -v --remove-orphans

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-artifacts
      - bubble-smoke
      - publish-images
      - compose-smoke

    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout repository at tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-assets
          path: release-assets

      - name: Download image manifest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: image-assets
          path: release-assets

      - name: Generate release notes
        id: cliff_release
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5
        with:
          config: .github/cliff.toml
          args: >-
            -vv --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          name: Release ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Write publish summary
        env:
          CLIFF_RELEASE_NOTES: ${{ steps.cliff_release.outputs.content }}
        run: |
          {
            echo "## GitHub Release"
            echo
            echo "- Tag: \`${{ github.ref_name }}\`"
            echo "- Version: \`${{ needs.build-artifacts.outputs.version }}\`"
            echo "- Server Image: \`${{ needs.publish-images.outputs.server_image }}:${{ needs.build-artifacts.outputs.version }}\`"
            echo "- Web Image: \`${{ needs.publish-images.outputs.web_image }}:${{ needs.build-artifacts.outputs.version }}\`"
            echo
            printf '%s\n' "${CLIFF_RELEASE_NOTES}"
          } >> "${GITHUB_STEP_SUMMARY}"
