name: Publish Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read

jobs:
  build-artifacts:
    name: Build Artifacts
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      version: ${{ steps.tag_version.outputs.version }}

    steps:
      - name: Checkout repository at tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine tag version
        id: tag_version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          version="${version#V}"
          echo "tag=${tag}"
          echo "version=${version}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.13

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee
        with:
          version: v2.12.2
          working-directory: server
          install-only: true

      - name: Resolve backend release validation base
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --prune origin main
          echo "GRAFT_LINT_BASE_REF=refs/remotes/origin/main" >> "${GITHUB_ENV}"

      - name: Run backend release validation
        working-directory: server
        run: go run ./cmd/graft validate backend

      - name: Build server binary
        working-directory: server
        env:
          CGO_ENABLED: "1"
        run: |
          set -euo pipefail
          mkdir -p ../dist/server
          build_time_utc="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build \
            -trimpath \
            -ldflags="-s -w \
              -X 'graft/server/internal/buildinfo.version=${{ steps.tag_version.outputs.version }}' \
              -X 'graft/server/internal/buildinfo.gitCommit=${GITHUB_SHA}' \
              -X 'graft/server/internal/buildinfo.buildTimeUTC=${build_time_utc}' \
              -X 'graft/server/internal/buildinfo.gitTreeState=clean'" \
            -o ../dist/server/graft-server-linux-amd64 \
            ./cmd/graft

      - name: Validate release binary contract
        run: |
          set -euo pipefail
          ./dist/server/graft-server-linux-amd64 validate release

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Run web release validation
        working-directory: web
        run: bun run check

      - name: Build web distribution
        working-directory: web
        run: bun run build

      - name: Package release artifacts
        run: |
          set -euo pipefail
          mkdir -p release-assets
          tar -C dist/server -czf "release-assets/graft-server-linux-amd64-${{ github.ref_name }}.tar.gz" graft-server-linux-amd64
          tar -C web -czf "release-assets/graft-web-dist-${{ github.ref_name }}.tar.gz" dist
          cp LICENSE "release-assets/graft-license-${{ github.ref_name }}.txt"
          sha256sum release-assets/* > "release-assets/graft-sha256sums-${{ github.ref_name }}.txt"

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-assets
          path: release-assets/*
          if-no-files-found: error

  bubble-smoke:
    name: Bubble Smoke Gate
    runs-on: ubuntu-latest
    needs: build-artifacts
    timeout-minutes: 15

    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: graft
          POSTGRES_USER: graft
          POSTGRES_PASSWORD: graft
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U graft -d graft"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      GRAFT_APP_ENV: ci
      GRAFT_HTTP_ADDR: 127.0.0.1:18080
      GRAFT_DATABASE_URL: postgres://graft:graft@127.0.0.1:5432/graft?sslmode=disable
      GRAFT_REDIS_ADDR: 127.0.0.1:6379
      GRAFT_AUTH_JWT_SECRET: ci-release-smoke-secret
      GRAFT_LOG_FORMAT: json
      GRAFT_LOG_COLOR: never
      GRAFT_ACCESS_LOG_CONSOLE: error_only
      GRAFT_OPS_CONTAINER_RUNTIME_ENABLED: "false"
      GRAFT_OPS_CONTAINER_SHELL_ENABLED: "false"

    steps:
      - name: Checkout repository at tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-assets
          path: release-assets

      - name: Extract release binary
        run: |
          set -euo pipefail
          mkdir -p smoke-bin
          tar -C smoke-bin -xzf "release-assets/graft-server-linux-amd64-${GITHUB_REF_NAME}.tar.gz"
          chmod +x smoke-bin/graft-server-linux-amd64

      - name: Run release bubble smoke
        id: bubble_smoke
        shell: bash
        run: |
          set -euo pipefail
          start_epoch="$(date +%s)"
          probe_url="http://${GRAFT_HTTP_ADDR}/healthz"
          echo "probe_url=${probe_url}" >> "${GITHUB_OUTPUT}"

          mkdir -p .tmp
          ./smoke-bin/graft-server-linux-amd64 migrate up --allow-dirty 2>&1 | tee .tmp/release-bubble-migrate.log

          server_pid=""
          cleanup() {
            if [[ -n "${server_pid}" ]] && kill -0 "${server_pid}" >/dev/null 2>&1; then
              kill "${server_pid}" >/dev/null 2>&1 || true
              wait "${server_pid}" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          ./smoke-bin/graft-server-linux-amd64 serve > .tmp/release-bubble-server.log 2>&1 &
          server_pid=$!

          set +e
          smoke_status=1
          for _ in $(seq 1 30); do
            if curl -fsS "${probe_url}" > .tmp/release-bubble-healthz.json; then
              smoke_status=0
              break
            fi
            if ! kill -0 "${server_pid}" >/dev/null 2>&1; then
              smoke_status=1
              break
            fi
            sleep 1
          done
          end_epoch="$(date +%s)"
          duration="$((end_epoch - start_epoch))"
          echo "duration_seconds=${duration}" >> "${GITHUB_OUTPUT}"
          if [[ ${smoke_status} -ne 0 ]]; then
            echo "result=failed" >> "${GITHUB_OUTPUT}"
            cat .tmp/release-bubble-server.log
            exit "${smoke_status}"
          fi
          cat .tmp/release-bubble-healthz.json | tee .tmp/release-bubble-smoke.log
          set -e
          echo "result=passed" >> "${GITHUB_OUTPUT}"

      - name: Upload bubble smoke logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-bubble-smoke-logs
          path: |
            .tmp/release-bubble-migrate.log
            .tmp/release-bubble-server.log
            .tmp/release-bubble-healthz.json
            .tmp/release-bubble-smoke.log
          if-no-files-found: ignore

      - name: Write bubble smoke summary
        if: always()
        run: |
          {
            echo "## Bubble Smoke Gate"
            echo
            echo "- Tag: \`${{ github.ref_name }}\`"
            echo "- Version: \`${{ needs.build-artifacts.outputs.version }}\`"
            echo "- Probe URL: \`${{ steps.bubble_smoke.outputs.probe_url || 'http://127.0.0.1:18080/healthz' }}\`"
            echo "- Result: \`${{ steps.bubble_smoke.outputs.result || 'failed' }}\`"
            echo "- Duration Seconds: \`${{ steps.bubble_smoke.outputs.duration_seconds || 'unknown' }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-artifacts
      - bubble-smoke

    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout repository at tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-assets
          path: release-assets

      - name: Generate release notes
        id: cliff_release
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5
        with:
          config: .github/cliff.toml
          args: >-
            -vv --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          name: Release ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Write publish summary
        env:
          CLIFF_RELEASE_NOTES: ${{ steps.cliff_release.outputs.content }}
        run: |
          {
            echo "## GitHub Release"
            echo
            echo "- Tag: \`${{ github.ref_name }}\`"
            echo "- Version: \`${{ needs.build-artifacts.outputs.version }}\`"
            echo
            printf '%s\n' "${CLIFF_RELEASE_NOTES}"
          } >> "${GITHUB_STEP_SUMMARY}"
