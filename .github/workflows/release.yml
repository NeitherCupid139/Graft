name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview the semantic-release result without creating a tag.
        required: true
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  semantic-release-preview:
    name: Semantic Release Preview
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release PAT
        uses: ./.github/actions/validate-pat
        with:
          pat-token: ${{ secrets.PAT_TOKEN }}
          repo-api-url: ${{ github.api_url }}/repos/${{ github.repository }}
          repository: ${{ github.repository }}
          missing-token-message: PAT_TOKEN is required because semantic-release dry-run performs a remote push permission probe.

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Preview next release
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          npx --yes \
            -p semantic-release \
            -p @semantic-release/commit-analyzer \
            -p @semantic-release/release-notes-generator \
            -p conventional-changelog-conventionalcommits \
            semantic-release --dry-run --no-ci

  publish-version-tag:
    name: Publish Version Tag
    runs-on: ubuntu-latest
    needs: semantic-release-preview
    if: ${{ github.ref == 'refs/heads/main' && inputs.dry_run == false }}
    environment: release-approval

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release PAT
        uses: ./.github/actions/validate-pat
        with:
          pat-token: ${{ secrets.PAT_TOKEN }}
          repo-api-url: ${{ github.api_url }}/repos/${{ github.repository }}
          repository: ${{ github.repository }}
          missing-token-message: PAT_TOKEN is required to publish the semantic-release version tag.

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Publish semantic-release tag
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          npx --yes \
            -p semantic-release \
            -p @semantic-release/commit-analyzer \
            -p @semantic-release/release-notes-generator \
            -p conventional-changelog-conventionalcommits \
            semantic-release
