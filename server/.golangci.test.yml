version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  relative-path-mode: gomod

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - unused
    - revive
    - godot
    - gocyclo
    - cyclop
    - gocognit
    - gosec
    - maintidx
    - mnd
    - dupl
    - misspell
  settings:
    gocyclo:
      min-complexity: 20
    cyclop:
      max-complexity: 18
      package-average: 10.0
    gocognit:
      min-complexity: 25
    maintidx:
      under: 10
    mnd:
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "3"
    dupl:
      threshold: 200
    revive:
      severity: warning
      confidence: 0.8
      rules:
        - name: exported
        - name: package-comments
        - name: unused-parameter
        - name: context-as-argument
        - name: error-strings
        - name: error-naming
        - name: var-naming
        - name: function-result-limit
        - name: indent-error-flow
        - name: receiver-naming
        - name: bare-return
  exclusions:
    generated: lax
    paths:
      - "^vendor/"
      - "^third_party/"
      - "^internal/ent/migrate/migrations/"
      - "^internal/ent/(auditlog|permission|refreshsession|role|rolepermission|user|userrole|predicate|hook)/"
      - "^internal/ent/(auditlog|permission|refreshsession|role|rolepermission|user|userrole)\\.go$"
      - "^internal/ent/(auditlog|permission|refreshsession|role|rolepermission|user|userrole)_(create|delete|query|update)\\.go$"
      - "^internal/ent/client\\.go$"
      - "^internal/ent/ent\\.go$"
      - "^internal/ent/mutation\\.go$"
      - "^internal/ent/tx\\.go$"
      - "^internal/ent/enttest/"
    rules:
      - path: "^internal/ent/.*_test\\.go$"
        linters:
          - gocyclo
          - cyclop
          - gocognit
          - maintidx
          - mnd
          - dupl

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
