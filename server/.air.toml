#:schema https://json.schemastore.org/any.json

root = "."
tmp_dir = "tmp"

[build]
cmd = "sh -c 'go build -o ./tmp/graft ./cmd/graft >./tmp/air.log 2>&1 || { status=$?; cat ./tmp/air.log >&2; exit $status; }'"
entrypoint = ["./tmp/graft", "serve"]
include_ext = ["go"]
include_file = [".env"]
exclude_dir = ["tmp", "bin", "dist"]
exclude_regex = ['_test\.go']
exclude_unchanged = true
log = "air.log"
stop_on_error = true
send_interrupt = true
kill_delay = 500 # ms

[build.windows]
cmd = "powershell -NoProfile -Command \"$log = './tmp/air.log'; go build -o ./tmp/graft.exe ./cmd/graft *> $log; if ($LASTEXITCODE -ne 0) { Get-Content $log | Write-Error; exit $LASTEXITCODE }\""
entrypoint = ['tmp\graft.exe', "serve"]

[log]
time = false
main_only = false
silent = false

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = false
keep_scroll = true
