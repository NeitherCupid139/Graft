services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  bootstrap:
    image: ${GRAFT_SERVER_IMAGE}:${GRAFT_IMAGE_TAG}
    restart: "no"
    command: ["migrate", "up"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      GRAFT_APP_ENV: production
      GRAFT_DATABASE_URL: "host=postgres port=5432 dbname=${POSTGRES_DB} user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} sslmode=disable"
      GRAFT_REDIS_ADDR: redis:6379
      GRAFT_AUTH_JWT_SECRET: ${GRAFT_AUTH_JWT_SECRET}

  server:
    image: ${GRAFT_SERVER_IMAGE}:${GRAFT_IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    environment:
      GRAFT_APP_ENV: production
      GRAFT_HTTP_ADDR: :8080
      GRAFT_DATABASE_URL: "host=postgres port=5432 dbname=${POSTGRES_DB} user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} sslmode=disable"
      GRAFT_REDIS_ADDR: redis:6379
      GRAFT_AUTH_JWT_SECRET: ${GRAFT_AUTH_JWT_SECRET}
      GRAFT_DOCS_ENABLED: "true"
      GRAFT_LOG_FORMAT: json
      GRAFT_LOG_COLOR: never
    expose:
      - "8080"

  web:
    image: ${GRAFT_WEB_IMAGE}:${GRAFT_IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  postgres-data:
