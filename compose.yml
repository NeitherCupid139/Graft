services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${COMPOSE_FILE_DIR:-.}/.data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      GRAFT_REDIS_PASSWORD: ${GRAFT_REDIS_PASSWORD:-}
    command:
      - sh
      - -ec
      - |
        if [ -n "$${GRAFT_REDIS_PASSWORD:-}" ]; then
          exec redis-server --save "" --appendonly no --requirepass "$${GRAFT_REDIS_PASSWORD}"
        fi
        exec redis-server --save "" --appendonly no
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$${GRAFT_REDIS_PASSWORD:-}" ]; then
            REDISCLI_AUTH="$${GRAFT_REDIS_PASSWORD}" redis-cli ping
          else
            redis-cli ping
          fi
      interval: 5s
      timeout: 3s
      retries: 10

  bootstrap:
    image: ${GRAFT_SERVER_IMAGE}:${GRAFT_IMAGE_TAG}
    restart: "no"
    env_file:
      - .env
    command: ["migrate", "up"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      GRAFT_APP_ENV: ${GRAFT_APP_ENV:-production}
      GRAFT_DATABASE_URL: ${GRAFT_DATABASE_URL:-host=postgres port=5432 dbname=${POSTGRES_DB} user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} sslmode=disable}
      GRAFT_REDIS_ADDR: ${GRAFT_REDIS_ADDR:-redis:6379}
      GRAFT_AUTH_JWT_SECRET: ${GRAFT_AUTH_JWT_SECRET}
      GRAFT_HTTPX_WEBSOCKET_ALLOWED_ORIGINS: ${GRAFT_HTTPX_WEBSOCKET_ALLOWED_ORIGINS:-http://127.0.0.1:${GRAFT_WEB_HOST_PORT:-80},http://localhost:${GRAFT_WEB_HOST_PORT:-80}}

  server:
    image: ${GRAFT_SERVER_IMAGE}:${GRAFT_IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    environment:
      GRAFT_APP_ENV: ${GRAFT_APP_ENV:-production}
      GRAFT_HTTP_ADDR: ${GRAFT_HTTP_ADDR:-:8080}
      GRAFT_DATABASE_URL: ${GRAFT_DATABASE_URL:-host=postgres port=5432 dbname=${POSTGRES_DB} user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} sslmode=disable}
      GRAFT_REDIS_ADDR: ${GRAFT_REDIS_ADDR:-redis:6379}
      GRAFT_AUTH_JWT_SECRET: ${GRAFT_AUTH_JWT_SECRET}
      GRAFT_HTTPX_WEBSOCKET_ALLOWED_ORIGINS: ${GRAFT_HTTPX_WEBSOCKET_ALLOWED_ORIGINS:-http://127.0.0.1:${GRAFT_WEB_HOST_PORT:-80},http://localhost:${GRAFT_WEB_HOST_PORT:-80}}
    expose:
      - "${GRAFT_SERVER_EXPOSE_PORT:-8080}"

  web:
    image: ${GRAFT_WEB_IMAGE}:${GRAFT_IMAGE_TAG}
    restart: unless-stopped
    environment:
      GRAFT_SERVER_UPSTREAM: ${GRAFT_SERVER_UPSTREAM:-http://server:8080}
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${GRAFT_WEB_HOST_PORT:-80}:80"
